name: Build Mac App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew install glfw glew

    - name: Build
      run: |
        clang++ -std=c++17 \
          assets/scripts/main.cpp \
          dependencies/imgui/*.cpp \
          dependencies/imgui/backends/imgui_impl_glfw.cpp \
          dependencies/imgui/backends/imgui_impl_opengl2.cpp \
          -I. \
          -I./dependencies/imgui \
          -I./dependencies/imgui/backends \
          -I$(brew --prefix)/include \
          -L$(brew --prefix)/lib \
          -framework OpenGL \
          -framework Cocoa \
          -framework IOKit \
          -framework CoreVideo \
          -lglfw -lglew -lcurl \
          -o Minecraft_Mac_App

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Minecraft_Mac_App
        path: Minecraft_Mac_App
